  <script>
    // ═══ 移动端 AudioContext 安全垫 ═══
    // 部分移动端浏览器（某些 Android WebView、旧 iOS）
    // 在无用户手势时 new AudioContext() 会抛 NotAllowedError
    // 导致整个 App init 崩溃。此处用安全包装避免崩溃。
    (function() {
      var OrigAC = window.AudioContext || window.webkitAudioContext;
      if (!OrigAC) return;
      var SafeAC = function() {
        try { return new OrigAC(); }
        catch(e) {
          console.warn('[光触] AudioContext 不可用，已跳过音频');
          var noop = function() { return this; };
          var gain = { connect: noop, disconnect: noop, gain: { value: 0, setValueAtTime: noop } };
          return {
            createGain: function() { return Object.create(gain); },
            createBufferSource: function() {
              return { buffer: null, connect: noop, disconnect: noop, start: noop, stop: noop, loop: false, addEventListener: noop, removeEventListener: noop };
            },
            createConvolver: function() { return { connect: noop, disconnect: noop, buffer: null } },
            createMediaElementSource: function() { return { connect: noop, disconnect: noop } },
            destination: {},
            sampleRate: 44100,
            decodeAudioData: function(buf, cb) { if (cb) setTimeout(function() { cb(null); }, 0); return { then: function(cb) { setTimeout(cb, 0); return this; } }; },
            state: 'running',
            suspend: function() { return Promise.resolve(); },
            resume: function() { return Promise.resolve(); },
            close: function() { return Promise.resolve(); },
            currentTime: 0
          };
        }
      };
      SafeAC.prototype = OrigAC.prototype;
      window.AudioContext = SafeAC;
      if (window.webkitAudioContext) window.webkitAudioContext = SafeAC;
    })();
  </script>
  <script src="cannon.min.js"></script>
  <script src="main.js"></script>
  <script>
    // prevent scroll on mobile / touchpad
    document.addEventListener('touchmove', function(e) {e.preventDefault();}, {passive:false});

    (function() {
      var canvas = document.getElementById('gl-canvas');
      var isLoading = true;

      function bootApp() {
        if (!isLoading) return;
        isLoading = false;
        // 移除 start-overlay
        var overlay = document.getElementById('start-overlay');
        if (overlay) overlay.remove();
        // 预设关闭 CSS transition，让 canvas 立刻可见
        canvas.classList.add('active');
        // 启动 app
        var app;
        try { app = new App(); } catch(e) {
          console.error('App init failed:', e);
          var loading = document.getElementById('section-loading');
          if (loading) loading.innerHTML = '<p style="color:#666;text-align:center;padding:35% 20px;font-size:14px;line-height:1.8">设备兼容性提示<br><span style="font-size:11px;color:#444">此设备可能不支持 3D 渲染</span></p>';
        }
        // Fallback: 移动端 loadPromise 可能卡住，自动完成初始化
        // App 实例挂在 window.RobotXP
        // 策略：不调用 onLoaded()（含 matlib 注册逻辑容易失败），
        //       只做最小操作：隐藏 loading + 切换 section + 确保 canvas 可见
        setTimeout(function checkFallback() {
          var r = window.RobotXP;
          if (!r || !r.scene) { setTimeout(checkFallback, 500); return; }
          var model = r.scene.model;
          if (!model) { setTimeout(checkFallback, 500); return; }
          var loading = document.getElementById('section-loading');
          // 如果已经正常显示则跳过
          if (model._section === 1 && loading && loading.style.display === 'none') return;
          console.log('[光触] fallback: section=' + model._section + ', loading=' + (loading ? loading.style.display : 'null'));
          // 步骤1: 隐藏 loading 遮罩
          if (loading) loading.style.display = 'none';
          // 步骤2: 切换到 section 1（显示灯泡模型）
          try {
            if (model._section !== 1) {
              model.setSection(1);
              console.log('[光触] fallback: setSection(1) 成功');
            }
          } catch(e) {
            console.warn('[光触] setSection 失败:', e.message || e);
            // setSection 也失败就继续等
            setTimeout(checkFallback, 1000); return;
          }
          // 步骤3: 确保 canvas 可见
          var cvs = document.getElementById('gl-canvas');
          if (cvs) { cvs.style.opacity = '1'; cvs.style.visibility = 'visible'; }
          console.log('[光触] fallback 完成');
        }, 3000);
        // 播放背景音乐（需要用户手势）
        var audio = document.getElementById('soundtrack');
        if (audio) audio.play().catch(function(){});
      }

      // 判断是否移动端
      var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      if (isMobile) {
        // 添加点击启动覆盖层
        var overlay = document.createElement('div');
        overlay.id = 'start-overlay';
        overlay.innerHTML = '<div style="position:fixed;inset:0;z-index:10000;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer">'
          + '<div style="margin-bottom:20px;width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center">'
          + '<svg width="28" height="28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"><path d="M8 5v14l11-7z"/></svg>'
          + '</div>'
          + '<p style="margin:0;color:rgba(255,255,255,0.4);font-size:16px;letter-spacing:0.1em">点击开始</p>'
          + '<p style="margin:8px 0 0;color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:0.05em">Tap to interact</p>'
          + '</div>';
        document.body.appendChild(overlay);
        // 点击 / 触摸后启动
        overlay.addEventListener('click', bootApp);
        overlay.addEventListener('touchstart', function(e) { e.preventDefault(); bootApp(); }, {passive: false});
      } else {
        // 桌面端直接启动
        bootApp();
      }
    })();
  </script>
