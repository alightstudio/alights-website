<!DOCTYPE html>
<html lang="zh-CN">
    <head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>光汐 | Light Tide</title>
		<link href="styles.css" rel="stylesheet" media="screen" />
		<style>
			.lab-back {
				position: fixed; top: 16px; left: 16px; z-index: 9999;
				padding: 6px 12px; font-size: 12px; color: rgba(255,255,255,0.4);
				background: rgba(10,10,10,0.4); backdrop-filter: blur(8px);
				border-radius: 6px; text-decoration: none; letter-spacing: 0.15em;
				transition: color 0.2s; font-family: -apple-system, sans-serif;
			}
			.lab-back:hover { color: rgba(255,255,255,0.8); }
			body, html {
				background: #0a0a0a !important;
				margin: 0; overflow: hidden;
				width: 100%; height: 100%;
			}
			#world {
				position: absolute;
				border: 2px solid #222 !important;
				box-shadow: none !important;
				max-width: 100vw;
				max-height: 100vh;
			}
		</style>
    </head>
    <body>
		<a class="lab-back" href="/lab">← 返回实验室</a>
		<div id="seeMore" style="display:none"></div>
		<a id="keyboardLeft" style="display:none" href="#"></a>
		<a id="keyboardRight" style="display:none" href="#"></a>
		<canvas id="world"><p class="noCanvas">您的浏览器不支援 Canvas。</p></canvas>
		<script src="js/magnetic.min.js"></script>
    </body>
</html>
