<!DOCTYPE html>
<html lang=ja>
<head>
<meta charset=utf-8>
<meta http-equiv=X-UA-Compatible content="IE=edge">
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=viewport content="width=device-width, initial-scale=1.0, user-scalable=0, maximum-scale=1.0">
<meta name=description content=点击/触摸演奏声音与光影交互>
<title>光韵 | Light Rhythm</title>
<link charset=UTF-8 href=mikutap.css rel=stylesheet>
<script src=jquery.min.js type=text/javascript></script>
<script src=pixi.min.js type=text/javascript></script>
<script src=TweenMax.min.js type=text/javascript></script>
<script src=common.js?2 type=text/javascript></script>
<script src=mikutap.js type=text/javascript></script>
<style>
  #bt_back { display: none !important; }
  body { background: #0a0a0a !important; }
</style>
</head>
<body>
<script>
(function() {
  // 显示加载状态
  document.body.style.background = '#0a0a0a';
  var div = document.createElement('div');
  div.id = 'sonic-loading';
  div.style.cssText = 'color:#C9A962;font-family:Inter;display:flex;justify-content:center;align-items:center;height:100vh;height:100dvh;flex-direction:column;gap:16px;text-align:center;padding:20px';
  div.innerHTML = '<div style="font-size:14px;letter-spacing:0.3em;margin-bottom:20px">光韵 · LIGHT RHYTHM</div>' +
    '<div style="font-size:12px;color:#666">正在加载音乐实验...</div>';
  document.body.appendChild(div);

  // 检测 Web Audio API
  function checkWebAudio() {
    if (!window.AudioContext && !window.webkitAudioContext) {
      div.innerHTML = '<div style="font-size:14px;letter-spacing:0.3em">光韵 · LIGHT RHYTHM</div>' +
        '<div style="font-size:12px;color:#ff6b6b;margin-top:20px">抱歉，您的浏览器不支持 Web Audio API</div>' +
        '<div style="font-size:12px;color:#666;margin-top:10px">请使用 Chrome/Firefox/Safari 最新版</div>';
      return false;
    }
    return true;
  }

  if (!checkWebAudio()) {
    return;
  }

  // 监听 mikutap.js 加载完成
  var scripts = document.querySelectorAll('script[src]');
  for (var i = 0; i < scripts.length; i++) {
    if (scripts[i].src.indexOf('mikutap.js') !== -1) {
      scripts[i].addEventListener('load', function() {
        setTimeout(function() {
          var loading = document.getElementById('sonic-loading');
          if (loading) loading.style.display = 'none';
        }, 1000);
      });
    }
  }
})();
</script>

<div id=view></div>
<div id=scene_top>
  <h1>光韵</h1>
  <div id=ng><p class=atten>对不起，您的设备或浏览器暂不支持。</p></div>
  <div class=ok><p id=bt_start><a href="">START</a></p></div>
  <p id=bt_about><a href="">ABOUT</a></p>
  <div class=ok><p class=attention>※打开声音·体验更佳。</p></div>

</div>
<div id=scene_loading><hr size=1 color=#fff></div>
<div id=scene_main>
  <div class=set>
    <p class=attention>CLICK &amp; DRAG or PRESS ANY KEY!</p>
    <p id=bt_feedback><a href="">FEEDBACK: ON</a></p>
    <p id=bt_backtrack><a href="">BACKTRACK: ON</a></p>
  </div>
</div>
<div id=about_cover></div>
<div id=about>
  <div id=about_in>
    <p class=close><span id=bt_close>×</span></p>
    <p class=con>光韵</p>
    <p class=con>Alights Lab</p>

  </div>
</div>
<script>
// remove back/fullscreen buttons
document.addEventListener('DOMContentLoaded', function() {
  var bb = document.getElementById('bt_back');
  var bf = document.getElementById('bt_fs');
  if (bb) bb.style.display = 'none';
  // bf (fullscreen button) kept visible
});
</script>

<div id="start-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,10,10,0.95);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-family:system-ui;" onclick="this.style.display='none';document.getElementById('bt_start')?.querySelector('a')?.click();">
  <div style="font-size:14px;letter-spacing:0.3em;color:#666;margin-bottom:24px;">光韵 · LIGHT RHYTHM</div>
  <div style="font-size:48px;margin-bottom:16px;">🎵</div>
  <div style="font-size:12px;letter-spacing:0.15em;color:#444;">点击任意处开始体验</div>
  <div style="font-size:11px;color:#333;margin-top:12px;">CLICK ANYWHERE TO START</div>
</div>
</body>
</html>
