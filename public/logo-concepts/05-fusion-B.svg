<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 400" fill="none">
  <!--
    融合方案 B：字形一体化
    A 的左侧来自「光」字的竖线，右侧是独立腿
    A 的横线与光字底部同一水平
    中英文共享一整套几何系统
  -->

  <!-- 栖 -->
  <line x1="80" y1="20" x2="80" y2="118" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="55" y1="50" x2="105" y2="50" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="120" y1="20" x2="120" y2="108" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="120" y1="20" x2="175" y2="20" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="175" y1="20" x2="175" y2="108" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="120" y1="108" x2="175" y2="108" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>

  <!-- 光 → 其底部竖线 = 下方 A 的左腿 -->
  <line x1="230" y1="20" x2="230" y2="50" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="217" cy="33" r="1.5" stroke="#E8E0D0" stroke-width="0.8" fill="none"/>
  <path d="M230,50 L205,90" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>

  <!-- A—LIGHTS 一体化区域 -->
  <!-- A 左腿 = 光字竖线延续 -->
  <line x1="230" y1="130" x2="195" y2="240" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- A 右腿 -->
  <line x1="230" y1="130" x2="265" y2="240" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- A 横梁 + 光束向右延伸穿过 LIGHTS -->
  <line x1="207" y1="182" x2="340" y2="182" stroke="#B8963C" stroke-width="0.8" stroke-linecap="round"/>

  <!-- LIGHTS -->
  <text x="273" y="233" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="100" letter-spacing="10" fill="#E8E0D0">LIGHTS</text>

  <!-- 光字下方的竖弯钩短暂延续后融入 A 的主干 -->
  <line x1="230" y1="90" x2="250" y2="115" stroke="#E8E0D0" stroke-width="0.8" stroke-linecap="round"/>
  <path d="M250,115 L230,130" stroke="#E8E0D0" stroke-width="0.6" stroke-linecap="round" opacity="0.4"/>

  <text x="440" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="8" font-weight="200" letter-spacing="3" fill="#B8963C" text-anchor="end">TYPE B</text>
</svg>
