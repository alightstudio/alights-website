  <script>
    // ═══ 移动端 AudioContext 安全垫 ═══
    // 部分移动端浏览器（某些 Android WebView、旧 iOS）
    // 在无用户手势时 new AudioContext() 会抛 NotAllowedError
    // 导致整个 App init 崩溃。此处用安全包装避免崩溃。
    (function() {
      var OrigAC = window.AudioContext || window.webkitAudioContext;
      if (!OrigAC) return;
      var SafeAC = function() {
        try { return new OrigAC(); }
        catch(e) {
          
          var noop = function() { return this; };
          var gain = { connect: noop, disconnect: noop, gain: { value: 0, setValueAtTime: noop } };
          return {
            createGain: function() { return Object.create(gain); },
            createBufferSource: function() {
              return { buffer: null, connect: noop, disconnect: noop, start: noop, stop: noop, loop: false, addEventListener: noop, removeEventListener: noop };
            },
            createConvolver: function() { return { connect: noop, disconnect: noop, buffer: null } },
            createMediaElementSource: function() { return { connect: noop, disconnect: noop } },
            destination: {},
            sampleRate: 44100,
            decodeAudioData: function(buf, cb) { if (cb) setTimeout(function() { cb(null); }, 0); return { then: function(cb) { setTimeout(cb, 0); return this; } }; },
            state: 'running',
            suspend: function() { return Promise.resolve(); },
            resume: function() { return Promise.resolve(); },
            close: function() { return Promise.resolve(); },
            currentTime: 0
          };
        }
      };
      SafeAC.prototype = OrigAC.prototype;
      window.AudioContext = SafeAC;
      if (window.webkitAudioContext) window.webkitAudioContext = SafeAC;
    })();
  </script>

  <script>
    // prevent scroll on mobile / touchpad
    document.addEventListener('touchmove', function(e) {e.preventDefault();}, {passive:false});

    (function() {
      var canvas = document.getElementById('gl-canvas');
      var isLoading = true;

      function bootApp() {
        if (!isLoading) return;
        isLoading = false;
        // 移除 start-overlay
        var overlay = document.getElementById('start-overlay');
        if (overlay) overlay.remove();
        // 预设关闭 CSS transition，让 canvas 立刻可见
        canvas.classList.add('active');
        // 启动 app
        var app;
        try { app = new App(); window.RobotXP = app; } catch(e) {
          console.error('App init failed:', e);
          window.__appError = e.message || String(e);
          var loading = document.getElementById('section-loading');
          if (loading) loading.innerHTML = '<p style="color:#666;text-align:center;padding:35% 20px;font-size:14px;line-height:1.8">设备兼容性提示<br><span style="font-size:11px;color:#444">此设备可能不支持 3D 渲染</span></p>';
        }
        // Fallback: 移动端 loadPromise 可能卡住，自动完成初始化
        // App 实例挂在 window.RobotXP
        //       只做最小操作：隐藏 loading + 切换 section + 确保 canvas 可见
        setTimeout(function checkFallback() {
          var r = window.RobotXP;
          if (!r || !r.scene) { setTimeout(checkFallback, 500); return; }
          var model = r.scene.model;
          if (!model) { setTimeout(checkFallback, 500); return; }
          var scene = r.scene;  // ★ 修复：之前漏了这行，导致 scene 是 undefined
          var loading = document.getElementById('section-loading');
          // 如果已经正常显示则跳过（mods._loaded=true 说明场景已激活）
          if (model._section === 1 && loading && loading.style.display === 'none' && scene.mods && scene.mods._loaded) return;
          
          // 步骤1: 隐藏 loading 遮罩
          if (loading) loading.style.display = 'none';
          // 步骤2: 切换到 section 1
          try { if (model._section !== 1) { model.setSection(1);  } }
          catch(e) {  }
          // 步骤3: 激活场景渲染 + 确保 AWD 模型已加载
          try {
            if (scene.mods && !scene.mods._loaded) {
              // 3a. 检查 bulb AWD 状态，如果未加载则尝试触发
              var mod1_check = scene.mods.mods && scene.mods.mods[1];
              var bulb_check = mod1_check && mod1_check.bulb;
              if (bulb_check && bulb_check._state === 1) {
                // bulb 还在 init 状态！getLoadables() 从未被调用或加载失败
                // 尝试手动触发加载
                console.log('[FALLBACK] bulb _state=1, trying getLoadables...');
                try {
                  var loadables = bulb_check.getLoadables();
                  if (loadables && loadables.length > 0) {
                    console.log('[FALLBACK] got', loadables.length, 'loadables, waiting...');
                    // 等待 AWD 加载完成后再激活
                    Promise.all(loadables).then(function() {
                      console.log('[FALLBACK] AWD loaded! activating scene...');
                      scene.matlib.compileAll();
                      scene.mods._loaded = true;
                      scene.mods.updateLifecycle();
                      if (model._section !== 1) model.setSection(1);
                    }).catch(function(err) {
                      console.warn('[FALLBACK] AWD load failed:', err);
                      // 即使失败也激活，至少显示绳子和阴影
                      scene.matlib.compileAll();
                      scene.mods._loaded = true;
                      scene.mods.updateLifecycle();
                    });
                    // 不立即设 _loaded，等 Promise
                    if (loading) loading.style.display = 'none';
                    if (model._section !== 1) model.setSection(1);
                    return; // 提前返回，等 Promise
                  }
                } catch(getErr) {
                  console.warn('[FALLBACK] getLoadables error:', getErr);
                }
              }
              // 3b. 正常激活流程
              try { scene.matlib.compileAll(); } catch(e2) { console.warn('[FALLBACK] compileAll error:', e2); }
              scene.mods._loaded = true;
              scene.mods.updateLifecycle();
              
            } else {
              
            }
          } catch(e) {
            
            setTimeout(checkFallback, 1000); return;
          }
          // 再次确保 section=1（updateLifecycle 可能重置了 section）
          if (model._section !== 1) {
            model.setSection(1);
            
          }
          // 步骤4: 确保 canvas 可见
          var cvs = document.getElementById('gl-canvas');
          if (cvs) { cvs.style.opacity = '1'; cvs.style.visibility = 'visible'; }
          
        }, 3000);
        // 播放背景音乐（需要用户手势）
        var audio = document.getElementById('soundtrack');
        if (audio) audio.play().catch(function(){});
      }

      // 判断是否移动端
      var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      if (isMobile) {
        // 添加点击启动覆盖层
        var overlay = document.createElement('div');
        overlay.id = 'start-overlay';
        overlay.innerHTML = '<div style="position:fixed;inset:0;z-index:10000;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer">'
          + '<div style="margin-bottom:20px;width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center">'
          + '<svg width="28" height="28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"><path d="M8 5v14l11-7z"/></svg>'
          + '</div>'
          + '<p style="margin:0;color:rgba(255,255,255,0.4);font-size:16px;letter-spacing:0.1em">点击开始</p>'
          + '<p style="margin:8px 0 0;color:rgba(255,255,255,0.15);font-size:11px;letter-spacing:0.05em">Tap to interact</p>'
          + '</div>';
        document.body.appendChild(overlay);
        // 点击 / 触摸后启动
        overlay.addEventListener('click', bootApp);
        overlay.addEventListener('touchstart', function(e) { e.preventDefault(); bootApp(); }, {passive: false});
      } else {
        // 桌面端直接启动
        bootApp();
      }
    })();
  </script>
<script>
// 调试按钮（?debug=1 时显示）
if (window.location.search.includes('debug=1')) {
  var debugBtn = document.createElement('div');
  debugBtn.innerHTML = '🐞 调试';
  debugBtn.style.cssText = 'position:fixed;top:10px;right:10px;z-index:99999;background:rgba(0,0,0,0.8);color:#0f0;padding:6px 10px;border-radius:4px;font:12px monospace;cursor:pointer;user-select:none;';
  debugBtn.onclick = function() {
    var r = window.RobotXP || {};
    var scene = r.scene || {};
    var model = scene.model || {};
    var canvas = document.getElementById('gl-canvas') || {};
    var glErrors = [];
    if (canvas.getContext) {
      try { var gl = canvas.getContext('webgl'); if (!gl) glErrors.push('WebGL context null'); }
      catch(e) { glErrors.push(e.message); }
    } else {
      glErrors.push('canvas no getContext');
    }
    // 尝试获取 console.error 输出
    var appErr = window.__appError || 'none';
    // 深入检查渲染器/场景内部状态
    var rend = r.renderer || {};
    var camInfo = '❌';
    if (rend.camera) {
      var c = rend.camera;
      var p = c.position || {};
      camInfo = 'pos:(' + (p.x||0).toFixed(1) + ',' + (p.y||0).toFixed(1) + ',' + (p.z||0).toFixed(1) + ')';
    }
    var meshCount = 0;
    var meshNames = [];
    try {
      // 尝试从 renderer 或 scene 获取 mesh 信息
      var glctx = rend.gl || rend.context || rend._gl;
      if (rend.sceneGraph) {
        // 遍历场景图
        function countMeshes(node) {
          if (!node) return;
          if (node.mesh || node.draw) { meshCount++; meshNames.push(node.name || node.id || '?'); }
          var children = node.children || node._children || [];
          for (var i = 0; i < children.length; i++) countMeshes(children[i]);
        }
        countMeshes(rend.sceneGraph);
      } else if (scene.root) {
        function countRoot(n) {
          if (!n) return;
          if (n.meshes) { meshCount += n.meshes.length; }
          var ch = n.children || [];
          for (var j = 0; j < ch.length; j++) countRoot(ch[j]);
        }
        countRoot(scene.root);
      }
    } catch(e3) { meshCount = 'err:' + e3.message; }
    
    // 检查 model 内部
    var modelSections = '❌';
    if (model.sections) { modelSections = Object.keys(model.sections).join(','); }
    else if (model._sections) { modelSections = Object.keys(model._sections).join(','); }
    
    // 检查 mods 下的模块
    var modList = '';
    if (scene.mods && scene.mods.actives) {
      var acts = scene.mods.actives;
      if (Array.isArray(acts)) modList = acts.join(',');
      else if (typeof acts === 'object') modList = Object.keys(acts).join(',');
    }
    
    // === 深入检查 bulb mod (index 1) ===
    // 架构: mods[1] = light module(包装器) → .bulb = AWDScene(真正的3D场景)
    var bulbInfo = [];
    var mod1 = null;
    try {
      if (scene.mods && scene.mods.mods && scene.mods.mods[1]) {
        mod1 = scene.mods.mods[1];
        bulbInfo.push('mod1 type: ' + (mod1.constructor ? mod1.constructor.name : '?'));
        var awdScene = mod1.bulb;
        if (awdScene) {
          bulbInfo.push('bulb: ✅');
          bulbInfo.push('bulb._state: ' + (awdScene._state !== undefined ? awdScene._state + (awdScene._state===1?'(init)':awdScene._state===2?'(parsing)':awdScene._state===3?'(loaded)':'?') : '❓'));
          bulbInfo.push('bulb.meshes: ' + (Array.isArray(awdScene.meshes) ? awdScene.meshes.length : (awdScene.meshes ? 'not array' : 'undefined')));
          bulbInfo.push('bulb.node.ch: ' + ((awdScene.node&&awdScene.node.children) ? awdScene.node.children.length : 0));
          bulbInfo.push('bulb.loader: ' + (awdScene.loader ? '✅' : '❌'));
          bulbInfo.push('bulb._loadables: ' + (Array.isArray(awdScene._loadables) ? awdScene._loadables.length : (awdScene._loadables ? '?' : 'undefined')));
          // 检查 loadPromise
          if (awdScene._loadPromise) { bulbInfo.push('bulb.loadPromise: ✅ exists'); }
          else { bulbInfo.push('bulb.loadPromise: ❌ none (getLoadables never called?)'); }
          // 尝试获取 AWD URL
          try { var awdUrl = awdScene.getAwdUrl ? awdScene.getAwdUrl() : '?'; bulbInfo.push('awdUrl: ' + awdUrl); } catch(x) {}
        } else {
          bulbInfo.push('bulb: ❌ undefined!');
          var keys = Object.keys(mod1).filter(function(k){return k.charAt(0)!=='_';});
          bulbInfo.push('mod1 keys: ' + keys.slice(0,10).join(','));
        }
        // 也检查 rope（绳子）和 shadow（阴影）
        bulbInfo.push('rope: ' + (mod1.rope ? '✅' : '❌'));
        bulbInfo.push('shadow: ' + (mod1.shadow ? '✅' : '❌'));
        bulbInfo.push('physic: ' + (mod1.physic ? '✅' : '❌'));
      } else { bulbInfo.push('mods[1]: ❌ not found'); }
    } catch(e4) { bulbInfo.push('err: ' + e4.message); }

    // === 检查 scene.loadPromise 状态 ===
    var loadInfo = '';
    try {
      if (scene.loadPromise) {
        loadInfo = 'scene.loadPromise: ✅ exists';
        // 检查是否已 resolve（通过检查 _loaded 反推）
        loadInfo += scene.mods._loaded ? ' (resolved)' : ' (pending/rejected?)';
      } else { loadInfo = 'scene.loadPromise: ❌'; }
    } catch(e5) { loadInfo = 'load err:' + e5.message; }
    
    // 也检查所有 mods 的 _state
    var allModStates = '';
    if (scene.mods && scene.mods.mods) {
      for (var mi = 0; mi < scene.mods.mods.length; mi++) {
        var m = scene.mods.mods[mi];
        allModStates += (m._state !== undefined ? m._state : '?') + ' ';
      }
    }

    var info = [
      '=== 光触调试 ===',
      'App: ✅ | scene: ✅ | model: ✅',
      '_section: ' + (model._section !== undefined ? model._section : '❓'),
      'mods._loaded: ' + (scene.mods ? scene.mods._loaded : '❓'),
      'matlib: ' + (scene.matlib ? '✅ (' + Object.keys(scene.matlib.materials || {}).length + ' mats)' : '❌'),
      '',
      '--- Renderer ---',
      'canvas: ' + ((rend.canvas) ? (rend.canvas.width + 'x' + rend.canvas.height) : '❌'),
      'camera: ' + camInfo,
      'meshes: ' + meshCount,
      '',
      '--- Mods State ---',
      'mod1 keys: ' + (mod1 ? Object.keys(mod1).filter(function(k){return k.charAt(0)!=='_';}).slice(0,8).join(',') : '?'),
      '',
      '--- Load Status ---',
      loadInfo,
      '',
      '--- Bulb [1] ---',
    ].concat(bulbInfo).concat([
      '',
      '--- WebGL ---',
      'gl errors: ' + (glErrors.length ? glErrors.join(', ') : 'none'),
      'App init error: ' + appErr,
    ]);
    alert(info.join('\n'));
  };
  document.body.appendChild(debugBtn);
}
</script>
