<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- 极薄圆形轮廓 -->
  <circle cx="200" cy="200" r="148" stroke="#E8E0D0" stroke-width="0.8"/>

  <!-- 光隙 — 一条斜线精准切割 -->
  <line x1="80" y1="290" x2="290" y2="80" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>

  <!-- 因为斜线切割，圆的左上右下各留一个小缺口 -->
  <circle cx="200" cy="200" r="148" stroke="#E8E0D0" stroke-width="0.8"
          stroke-dasharray="0 999" stroke-dashoffset="0"/>
  
  <!-- 光束通过处的两道微弱平行线（几乎是影子） -->
  <line x1="85" y1="295" x2="295" y2="85" stroke="#E8E0D0" stroke-width="0.4" opacity="0.3" stroke-linecap="round"/>

  <text x="380" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="200" letter-spacing="3" fill="#B8963C" text-anchor="end">03</text>
</svg>
