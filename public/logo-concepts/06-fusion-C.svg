<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 320" fill="none">
  <!--
    融合方案 C：左右并排 + 共享光束
    栖光 | ALIGHTS
    中间一条黄金分割线连接
  -->

  <!-- 栖光 — 左侧站立 -->
  <line x1="50" y1="20" x2="50" y2="150" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25" y1="55" x2="75" y2="55" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="90" y1="20" x2="90" y2="135" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="90" y1="20" x2="145" y2="20" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="145" y1="20" x2="145" y2="135" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="90" y1="135" x2="145" y2="135" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <line x1="90" y1="75" x2="145" y2="75" stroke="#E8E0D0" stroke-width="0.6" stroke-linecap="round"/>

  <!-- 光 -->
  <line x1="200" y1="20" x2="200" y2="55" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M200,55 L175,100" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round"/>
  <path d="M200,55 L225,100 L225,180" stroke="#E8E0D0" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- 连接线 — 从光到 A -->
  <line x1="225" y1="180" x2="240" y2="180" stroke="#B8963C" stroke-width="0.6" stroke-linecap="round"/>

  <!-- ALIGHTS — 右侧 -->
  <line x1="245" y1="38" x2="215" y2="180" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="245" y1="38" x2="275" y2="180" stroke="#E8E0D0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- A 横线 + 光束向右延伸 -->
  <line x1="225" y1="108" x2="420" y2="108" stroke="#E8E0D0" stroke-width="0.8" stroke-linecap="round"/>

  <text x="283" y="175" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44" font-weight="100" letter-spacing="10" fill="#E8E0D0">LIGHTS</text>

  <text x="440" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="8" font-weight="200" letter-spacing="3" fill="#B8963C" text-anchor="end">TYPE C</text>
</svg>
