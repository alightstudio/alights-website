<!DOCTYPE html>
<html lang="zh-CN">
    <head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>光衍 | Light Propagation</title>
		<base href="/experiments/bacterium/">
		<link href="styles.css" rel="stylesheet" media="screen" />
		<style>
			.lab-back {
				position: fixed; top: 16px; left: 16px; z-index: 9999;
				padding: 6px 12px; font-size: 12px; color: rgba(255,255,255,0.4);
				background: rgba(10,10,10,0.4); backdrop-filter: blur(8px);
				border-radius: 6px; text-decoration: none; letter-spacing: 0.15em;
				transition: color 0.2s; font-family: -apple-system, sans-serif;
			}
			.lab-back:hover { color: rgba(255,255,255,0.8); }
			body, html {
				background: #0a0a0a !important;
				margin: 0; overflow: hidden;
				width: 100%; height: 100%;
			}
			#world {
				position: absolute;
				border: 2px solid #222 !important;
				box-shadow: none !important;
				background: #000;
			}
			@media (max-width: 768px) {
				#options { top: 8px !important; left: 8px !important; display: flex !important; flex-wrap: wrap; gap: 4px; }
				#options .switch { font-size: 10px; padding: 2px 6px; margin: 0; }
			}
		</style>
    </head>
    <body>
		<a class="lab-back" href="/lab">← 返回实验室</a>
		<div id="options" style="display:none">
			<a id="reset-button" class="switch" href="#">Reset</a>
			<a id="gravity-switch" class="switch" href="#">Gravity <span>OFF</span></a>
			<a id="depth-switch" class="switch" href="#">Depth <span>OFF</span></a>
			<a id="turbines-switch" class="switch" href="#">Turbines <span>OFF</span></a>
			<a id="infection-switch" class="switch" href="#">Infection <span>OFF</span></a>
		</div>
		<div id="instructions" style="display:none"></div>
		<canvas id="world"><p class="noCanvas">您的浏览器不支援 Canvas。</p></canvas>
		<script src="js/util.js"></script>
		<script src="js/bacterium.js"></script>
    </body>
</html>
