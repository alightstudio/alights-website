<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栖光 Logo 概念</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #aaa; }
  .container { max-width: 1200px; margin: 0 auto; padding: 60px 40px; }
  h1 { font-size: 24px; font-weight: 300; letter-spacing: 4px; color: #B8963C; margin-bottom: 60px; }
  h1 span { color: #444; }
  .concepts { display: flex; flex-direction: column; gap: 80px; }
  .concept { border-top: 1px solid #1a1a1a; padding-top: 40px; }
  .concept-label { font-size: 11px; color: #555; letter-spacing: 2px; margin-bottom: 24px; }
  .concept-row { display: flex; flex-direction: column; gap: 20px; }
  .preview { background: #0e0e0e; border: 1px solid #1a1a1a; border-radius: 8px; padding: 60px; display: flex; align-items: center; justify-content: center; min-height: 260px; }
  .preview svg { max-width: 100%; height: auto; }
  .desc { font-size: 13px; line-height: 1.8; color: #666; max-width: 600px; }
  strong { color: #888; }
  .tags { display: flex; gap: 8px; margin-top: 16px; }
  .tag { font-size: 10px; padding: 3px 10px; border: 1px solid #222; border-radius: 12px; color: #555; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <h1>栖光 · <span>Logo 概念设计</span></h1>
  <div class="concepts">
    <div class="concept">
      <div class="concept-label">01</div>
      <div class="concept-row">
        <div class="preview"><img src="01-wordmark.svg" alt="Wordmark" style="max-height:180px"></div>
        <div class="desc">
          <strong>ALIGHTS 字母标</strong><br>
          「A」横线向右延伸为光束，渐隐消失。200磅超细字重+10字距，极简克制。金色分割线下方缀「VISION」副标。
          <div class="tags"><span class="tag">英文</span><span class="tag">横向</span><span class="tag">金+白</span></div>
        </div>
      </div>
    </div>

    <div class="concept">
      <div class="concept-label">02</div>
      <div class="concept-row">
        <div class="preview"><img src="02-chinese.svg" alt="Chinese" style="max-height:200px"></div>
        <div class="desc">
          <strong>栖光 汉字标</strong><br>
          传统「栖」字结构内嵌入金色弧光，「光」字右下角三根渐隐直线代表光芒散出。汉字作为LOGO主体，辨识度高。
          <div class="tags"><span class="tag">中文</span><span class="tag">纵向/方形</span><span class="tag">文化感</span></div>
        </div>
      </div>
    </div>

    <div class="concept">
      <div class="concept-label">03</div>
      <div class="concept-row">
        <div class="preview"><img src="03-geometric.svg" alt="Geometric" style="max-height:320px"></div>
        <div class="desc">
          <strong>光隙 几何符号标</strong><br>
          圆形透镜框架内，一道金色光束从左上向右下斜切——象征「光穿过缝隙」。圆代表镜头/视野，光束代表专业方向。可独立作为图标。
          <div class="tags"><span class="tag">图形标</span><span class="tag">方形</span><span class="tag">符号化</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
