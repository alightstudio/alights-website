<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, minimal-ui, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>光触 | Light Touch</title>
  <base href="/experiments/touch/">
  <link rel="stylesheet" href="index.css">
  <style>
    html, body { background: #1a1a2e; margin: 0; padding: 0; width: 100%; height: 100%; }
    #gl-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: block; }
    .lab-back {
        position: fixed; top: 16px; left: 16px; z-index: 9999;
        padding: 6px 12px; font-size: 12px; color: rgba(255,255,255,0.4);
        background: rgba(10,10,10,0.4); backdrop-filter: blur(8px);
        border-radius: 6px; text-decoration: none; letter-spacing: 0.15em;
        transition: color 0.2s; font-family: -apple-system, sans-serif;
    }
    .lab-back:hover { color: rgba(255,255,255,0.8); }
    #section-loading { display: block; }
    #start-overlay { display: none; position: fixed; inset: 0; z-index: 10000; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    .touch-active #start-overlay { display: none !important; }
  </style>
</head>
<body>
<a class="lab-back" href="/lab">← 返回实验室</a>
  <section id='section-loading'>
    <svg class="spinner" width="108" height="108" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 315 A 50 50 0 0 1 162.55 162.45" stroke="white" fill="none" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </section>

  <section id='section-outro'>
    <div class="section-outro__container">
      <div class="section-outro__content hidden">
        光栖之处·自有答案
        <br>
        <a class="btn-replay hidden" href="/lab"><span>Restart</span></a>
      </div>
    </div>

        <svg id="bigyear" class="bigyear" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320">
      <g>
        <!-- 2 -->
        <path class="svg-line-animations" d="M20,15 Q10,15 10,30 L10,50 Q10,65 30,65 L120,65 Q140,65 140,80 L140,150 Q140,175 110,175 L30,175 Q10,175 10,195 L10,285 Q10,305 30,305 L140,305 Q160,305 160,285" stroke="white" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 0 -->
        <path class="svg-line-animations" d="M220,30 Q220,15 235,15 L325,15 Q340,15 340,30 L340,285 Q340,305 325,305 L235,305 Q220,305 220,285 Z" stroke="white" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 2 (second) -->
        <path class="svg-line-animations" d="M400,15 Q390,15 390,30 L390,50 Q390,65 410,65 L500,65 Q520,65 520,80 L520,150 Q520,175 490,175 L410,175 Q390,175 390,195 L390,285 Q390,305 410,305 L520,305 Q540,305 540,285" stroke="white" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 6 -->
        <path class="svg-line-animations" d="M580,285 Q580,305 600,305 L690,305 Q710,305 710,285 L710,175 Q710,160 690,160 L620,160 Q600,160 600,175 L600,215 Q600,230 620,230 L680,230 Q700,230 700,245 L700,245" stroke="white" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="svg-line-animations" d="M680,30 Q680,15 660,15 L600,15 Q580,15 580,30 L580,175" stroke="white" fill="none" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </svg>

    <ul class="socials hidden">
      <li class="facebook" style="visibility:hidden"></li>
      <li class="twitter" style="visibility:hidden"></li>
      <li class="instagram" style="visibility:hidden"></li>
    </ul>

  </section>

  <canvas id='gl-canvas'></canvas>
  <audio id='soundtrack' loop>
    <source src="assets/sounds/soundtrack.mp3" type="audio/mp3">
  </audio>

  <div class="white-layer"></div>

  <div class="mouse-cursor disabled">
    <span></span>
  </div>

  <a class="logo hidden" href="/">
    <img src="/logo.png" alt="Alights" style="height:18px;width:auto;filter:brightness(0) invert(1);">
  </a>

  <div class="navigation hidden">
    <div class="dragger-area">
      <canvas></canvas>
      <div class="dragger-cursor"></div>
    </div>
  </div>

  <script src="cannon.min.js"></script>
  <script src="main.js"></script>
  <script>
    // prevent scroll on mobile / touchpad
    document.addEventListener('touchmove', function(e) {e.preventDefault();}, {passive:false});

    (function() {
      var isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      var app;

      function bootApp() {
        try { 
          app = new App();
          window.RobotXP = app; // 暴露给控制台调试
        } catch(e) {
          console.error('App init failed:', e);
          document.getElementById('section-loading').innerHTML = 
            '<p style="color:#666;text-align:center;padding:40% 20px;font-size:14px">设备兼容性提示<br><span style="font-size:11px;color:#444">您的设备可能不支持 3D 渲染，请在电脑端访问以获得最佳体验</span></p>';
        }
        // 移除 overlay
        var overlay = document.getElementById('start-overlay');
        if (overlay) overlay.remove();
        document.documentElement.classList.add('touch-active');
        
        // 移动端 fallback：检测 when.js 是否卡住
        if (isMobile) {
          setTimeout(checkAndFixLoading, 4000);
        }
      }
      
      // 检测并修复移动端加载问题
      function checkAndFixLoading() {
        var r = window.RobotXP;
        if (!r || !r.scene) return;
        
        var scene = r.scene;
        var loading = document.getElementById('section-loading');
        
        // 检查 mods 是否已激活
        if (scene.mods && scene.mods._loaded === true) {
          console.log('[光触] 正常加载完成');
          return;
        }
        
        console.warn('[光触] 检测到 when.js Promise 未 resolve，尝试修复...');
        
        // 获取 bulb AWD 场景
        var mod1 = scene.mods && scene.mods.mods && scene.mods.mods[1];
        var bulb = mod1 && mod1.bulb;
        
        if (!bulb) {
          console.error('[光触] 找不到 bulb 模块');
          return;
        }
        
        // 检查 AWD 加载状态
        var state = bulb._state;
        console.log('[光触] bulb._state:', state, '(1=init, 2=parsing, 3=loaded)');
        console.log('[光触] bulb.meshes:', bulb.meshes ? bulb.meshes.length : 0);
        
        // 如果 meshes 已创建但 _state 卡在 2，强制完成
        if (state === 2 && bulb.meshes && bulb.meshes.length > 0) {
          console.log('[光触] AWD 已解析，强制完成加载流程');
          bulb._state = 3; // 强制设为 loaded
        }
        
        // 等待所有资源（包括 IBL）加载完成后再编译材质
        waitForResourcesAndCompile(scene, 0);
      }
      
      // 等待资源加载完成后再编译材质
      function waitForResourcesAndCompile(scene, attempts) {
        if (attempts > 20) { // 最多等待 10 秒
          console.error('[光触] 资源加载超时');
          return;
        }
        
        // 检查环境贴图是否加载
        var env = scene.env;
        var iblReady = env && env.ibl && env.ibl.envTex;
        
        // 检查 AWD 场景
        var mod1 = scene.mods && scene.mods.mods && scene.mods.mods[1];
        var bulb = mod1 && mod1.bulb;
        var awdReady = bulb && bulb._state === 3 && bulb.meshes && bulb.meshes.length > 0;
        
        console.log('[光触] 资源状态:', 'IBL=' + !!iblReady, 'AWD=' + !!awdReady, 'attempt=' + attempts);
        
        if (iblReady && awdReady) {
          // 所有资源就绪，执行 scene.loaded()
          console.log('[光触] 所有资源就绪，执行 scene.loaded()');
          try {
            scene.loaded();
          } catch(e) {
            console.warn('[光触] scene.loaded() error:', e);
          }
          
          // 显示导航和 logo
          var navEl = document.querySelector('.navigation');
          if (navEl) navEl.classList.remove('hidden');
          var logoEl = document.querySelector('.logo');
          if (logoEl) logoEl.classList.remove('hidden');
          var cursorEl = document.querySelector('.mouse-cursor');
          if (cursorEl) cursorEl.classList.remove('disabled');
          
          // 隐藏 loading
          if (loading) loading.style.display = 'none';
          
          console.log('[光触] 修复完成');
        } else {
          // 资源还未就绪，500ms 后重试
          setTimeout(function() {
            waitForResourcesAndCompile(scene, attempts + 1);
          }, 500);
        }
      }

      // 移动端：添加点击启动覆盖层
      if (isMobile) {
        var overlay = document.createElement('div');
        overlay.id = 'start-overlay';
        overlay.innerHTML = '<div style="margin-bottom:20px;width:64px;height:64px;border-radius:50%;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center">' +
          '<svg width="28" height="28" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"><path d="M8 5v14l11-7z"/></svg>' +
          '</div>'
          + '<p style="margin:0;color:rgba(255,255,255,0.4);font-size:16px;letter-spacing:0.1em">点击开始</p>';
        overlay.addEventListener('click', bootApp);
        overlay.addEventListener('touchstart', function(e) { e.preventDefault(); bootApp(); }, {passive: false});
        document.body.appendChild(overlay);
      } else {
        // 桌面端直接启动
        bootApp();
      }

      // 10秒超时检测：如果 loading 还在显示，提示用户
      setTimeout(function() {
        var loading = document.getElementById('section-loading');
        if (loading && loading.style.display !== 'none') {
          console.warn('[光触] 页面加载超过 10 秒');
          loading.innerHTML = '<p style="color:#666;text-align:center;padding:35% 20px;font-size:14px;line-height:1.8">页面加载较慢<br><span style="font-size:11px;color:#444">请尝试刷新页面或检查网络连接</span></p>';
        }
      }, 10000);
    })();
  </script>
</body>
</html>
